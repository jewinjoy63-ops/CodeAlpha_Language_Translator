<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Language Translation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans text-slate-200">

    <div class="w-full max-w-4xl glass-panel rounded-2xl shadow-2xl overflow-hidden relative">
        <div class="h-2 w-full bg-gradient-to-r content-none from-blue-500 via-indigo-500 to-purple-600"></div>
        
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-indigo-600/20 text-indigo-400 p-3 rounded-lg border border-indigo-500/30">
                <i class="fa-solid fa-language text-2xl animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                    Language Translator AI
                </h1>
                <p class="text-xs sm:text-sm text-slate-400">CodeAlpha AI Internship</p>
            </div>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 relative">
            
            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-slate-400 tracking-wider uppercase">Source Language</label>
                    <select id="sourceLang" class="bg-slate-800 text-slate-200 text-sm border border-slate-700 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-500 cursor-pointer transition">
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Mandarin</option>
                        <option value="ar">Arabic</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>
                <div class="relative">
                    <textarea id="sourceText" placeholder="Type or paste your content here..." 
                        class="w-full h-48 p-4 bg-slate-900/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 resize-none focus:outline-none focus:border-indigo-500 transition text-base leading-relaxed"></textarea>
                    <div class="absolute bottom-3 right-3 text-xs text-slate-600 font-mono" id="charCounter">0 / 5000</div>
                </div>
            </div>

            <div class="absolute left-1/2 top-[47%] md:top-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
                <button id="swapBtn" title="Swap Languages" 
                    class="w-10 h-10 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg flex items-center justify-center border border-indigo-400/20 active:scale-95 transition-all transform hover:rotate-180 duration-300">
                    <i class="fa-solid fa-arrows-rotate text-sm md:rotate-90"></i>
                </button>
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-slate-400 tracking-wider uppercase">Target Language</label>
                    <select id="targetLang" class="bg-slate-800 text-slate-200 text-sm border border-slate-700 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-500 cursor-pointer transition">
                        <option value="en">English</option>
                        <option value="es" selected>Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Mandarin</option>
                        <option value="ar">Arabic</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>
                <div class="relative group">
                    <div id="targetTextPlaceholder" class="absolute inset-0 p-4 text-slate-500 pointer-events-none text-base leading-relaxed">Translation will render cleanly here...</div>
                    <textarea id="targetText" readonly 
                        class="w-full h-48 p-4 bg-slate-950/40 border border-slate-800/80 rounded-xl text-indigo-300 font-medium resize-none focus:outline-none transition text-base leading-relaxed select-all"></textarea>
                    
                    <div class="absolute bottom-3 right-3 flex items-center gap-2">
                        <button id="copyBtn" title="Copy Translation" class="w-8 h-8 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-300 flex items-center justify-center border border-slate-700 active:scale-90 transition relative">
                            <i class="fa-regular fa-copy text-xs"></i>
                            <span id="toast" class="absolute -top-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-[10px] px-1.5 py-0.5 rounded opacity-0 transition-opacity pointer-events-none">Copied!</span>
                        </button>
                        <button id="speechBtn" title="Listen to Output" class="w-8 h-8 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-300 flex items-center justify-center border border-slate-700 active:scale-90 transition">
                            <i class="fa-solid fa-volume-high text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <div class="px-6 py-4 bg-slate-900/40 border-t border-slate-800/60 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-slate-500">
            <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                <span>API Status: Free Public Gateway Connected</span>
            </div>
            <div>Deployment Repository Vector: <span class="text-indigo-400 font-mono">CodeAlpha_Language_Translator</span></div>
        </div>
    </div>

    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const targetTextPlaceholder = document.getElementById('targetTextPlaceholder');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const swapBtn = document.getElementById('swapBtn');
        const copyBtn = document.getElementById('copyBtn');
        const speechBtn = document.getElementById('speechBtn');
        const toast = document.getElementById('toast');
        const charCounter = document.getElementById('charCounter');

        let debounceTimer;

        // Perform text length monitoring
        sourceText.addEventListener('input', () => {
            const length = sourceText.value.length;
            charCounter.textContent = `${length} / 5000`;
            
            // Toggle view configurations for the placeholder string
            if(length > 0) targetTextPlaceholder.classList.add('hidden');
            else {
                targetTextPlaceholder.classList.remove('hidden');
                targetText.value = '';
                return;
            }

            // Implement simple performance network debouncer to optimize active API quotas
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(triggerTranslationPipeline, 500);
        });

        // Watch dropdown rule alterations to immediately update output strings
        sourceLang.addEventListener('change', triggerTranslationPipeline);
        targetLang.addEventListener('change', triggerTranslationPipeline);

        // Core Translation API Fetch Request Workflow
        async function triggerTranslationPipeline() {
            const queryText = sourceText.value.trim();
            if (!queryText) return;

            targetText.value = "Translating matrix vectors...";
            
            const sl = sourceLang.value;
            const tl = targetLang.value;

            // Direct call to public MyMemory translation API network array
            const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(queryText)}&langpair=${sl}|${tl}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Network latency event detected.");
                
                const data = await response.json();
                if(data.responseData) {
                    targetText.value = data.responseData.translatedText;
                } else {
                    targetText.value = "Translation lookup pipeline failure.";
                }
            } catch (error) {
                console.error(error);
                targetText.value = "Error: Failed to fetch data from API cluster node.";
            }
        }

        // Language and Input Swap Button Operation
        swapBtn.addEventListener('click', () => {
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;

            if(sourceText.value.length > 0) {
                targetTextPlaceholder.classList.add('hidden');
                charCounter.textContent = `${sourceText.value.length} / 5000`;
                triggerTranslationPipeline();
            } else {
                targetTextPlaceholder.classList.remove('hidden');
                charCounter.textContent = `0 / 5000`;
            }
        });

        // Copy Clipboard Control Macro
        copyBtn.addEventListener('click', () => {
            const outputString = targetText.value.trim();
            if(!outputString || outputString.includes("Translating")) return;

            navigator.clipboard.writeText(outputString).then(() => {
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100');
                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                }, 2000);
            });
        });

        // Speech Synthesis Feature
        speechBtn.addEventListener('click', () => {
            const outputString = targetText.value.trim();
            if(!outputString || outputString.includes("Translating")) return;

            // Stop speech loop if active
            window.speechSynthesis.cancel();

            const speechObj = new SpeechSynthesisUtterance(outputString);
            speechObj.lang = targetLang.value;
            window.speechSynthesis.speak(speechObj);
        });
    </script>
</body>
</html>
